<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gml - Cat List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <label>gml - Cat List</label>
    </header>
    <div id="content">
        <p>
            Below are some cool types of cat. I only included cool cats,
            but if your favorite is not on this list it's not because it
            isn't cool or it isn't a cat. It's probably just somewhere in-between.
        </p>
        <div id="cat-grid">
            <div class="cat-card">
                <img src="assets/tabby-cat.webp">
                <div class="cat-description">
                    <label class="cat-label">
                        Tabby Cat
                    </label>
                </div>
            </div>
            <div class="cat-card">
                <img src="assets/burmese-cat.jpg">
                <div class="cat-description">
                    <label class="cat-label">
                        Burmese Cat
                    </label>
                </div>
            </div>
            <div class="cat-card">
                <img src="assets/munchkin-cat.webp">
                <div class="cat-description">
                    <label class="cat-label">
                        Munchkin Cat
                    </label>
                </div>
            </div>
            <div class="cat-card">
                <img src="assets/bob.jpeg">
                <div class="cat-description">
                    <label class="cat-label">
                        Bob
                    </label>
                </div>
            </div>
            <div class="cat-card">
                <img src="assets/sphynx-cat.png">
                <div class="cat-description">
                    <label class="cat-label">
                        Sphynx Cat
                    </label>
                </div>
            </div>
            <div class="cat-card">
                <img src="assets/british-shorthair.jpg">
                <div class="cat-description">
                    <label class="cat-label">
                        British Shorthair
                    </label>
                </div>
            </div>
            <div class="cat-card">
                <img src="assets/garfield.jpg">
                <div class="cat-description">
                    <label class="cat-label">
                        Garfield
                    </label>
                </div>
            </div>
            <div class="cat-card">
                <img src="assets/persian-cat.webp">
                <div class="cat-description">
                    <label class="cat-label">
                        Persian Cat
                    </label>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
